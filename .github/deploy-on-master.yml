name: Deploy Full Stack on Main Push

on:
  push:
    branches: [ main ]
    paths:
      - 'back-end/**'
      - 'front-end/**'
      - '.github/workflows/**'

jobs:
  backend:
    name: Build & Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Google Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: "${{ secrets.GCP_PROJECT_ID }}"


      - name: Build container image with Dockerfile
        run: |
          gcloud builds submit ./back-end \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }} \
            --project=${{ secrets.GCP_PROJECT_ID }}


      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_NAME }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="^~^DJANGO_SETTINGS_MODULE=back_office.settings.production~SECRET_KEY=${{ secrets.SECRET_KEY }}~DATABASE_URL=${{ secrets.DATABASE_URL }}~ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}~CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}~CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}~BSALE_API_URL=${{ secrets.BSALE_API_URL }}~BSALE_API_TOKEN=${{ secrets.BSALE_API_TOKEN }}~SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}~SHOPIFY_API_PASSWORD=${{ secrets.SHOPIFY_API_PASSWORD }}~SHOPIFY_WEBHOOK_SECRET=${{ secrets.SHOPIFY_WEBHOOK_SECRET }}~SHOPIFY_STORE_NAME=${{ secrets.SHOPIFY_STORE_NAME }}~SHOPIFY_API_VERSION=${{ secrets.SHOPIFY_API_VERSION }}~SHOPIFY_ADMIN_ACCESS_TOKEN=${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Run Migrations (via Cloud Run Job)
        run: |
          MIGRATE_JOB_NAME="migrate-${{ secrets.CLOUD_RUN_SERVICE_NAME }}"
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }}"
          ENV_VARS="^~^DJANGO_SETTINGS_MODULE=back_office.settings.production~SECRET_KEY=${{ secrets.SECRET_KEY }}~DATABASE_URL=${{ secrets.DATABASE_URL }}~ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}~CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}~CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}~BSALE_API_URL=${{ secrets.BSALE_API_URL }}~BSALE_API_TOKEN=${{ secrets.BSALE_API_TOKEN }}~SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}~SHOPIFY_API_PASSWORD=${{ secrets.SHOPIFY_API_PASSWORD }}~SHOPIFY_WEBHOOK_SECRET=${{ secrets.SHOPIFY_WEBHOOK_SECRET }}~SHOPIFY_STORE_NAME=${{ secrets.SHOPIFY_STORE_NAME }}~SHOPIFY_API_VERSION=${{ secrets.SHOPIFY_API_VERSION }}~SHOPIFY_ADMIN_ACCESS_TOKEN=${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}"
          
          gcloud run jobs update $MIGRATE_JOB_NAME \
            --image $IMAGE \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --set-env-vars="$ENV_VARS" \
            --task-timeout "5m" \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            ||
          gcloud run jobs create $MIGRATE_JOB_NAME \
            --image $IMAGE \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --set-env-vars="$ENV_VARS" \
            --task-timeout "5m" \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

          echo "Executing migration job..."
          gcloud run jobs execute $MIGRATE_JOB_NAME \
            --wait \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

  frontend:
    name: Build & Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # LTS version

      - name: Install Dependencies
        run: npm install
        working-directory: ./front-end

      - name: Create .env.production file
        run: |
          echo "VITE_BACKEND_HOST=${{ secrets.PROD_API_URL }}" > .env.production
        working-directory: ./front-end
        
      - name: Build Project
        run: npm run build
        working-directory: ./front-end

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BACK_OFFICE_BOOKLAND_V1_0 }}'
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }} # Assuming Firebase and GCP projects are the same
          target: back-office-bookland-online-store # Optional: if you have multiple sites
          entryPoint: ./front-end
          
